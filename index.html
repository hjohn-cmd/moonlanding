<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISSION CONTROL // LOGIN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

  :root {
    --red: #cc0000;
    --red-dim: #7a0000;
    --green: #00ff41;
    --green-dim: #00aa2a;
    --bg: #020408;
    --text: #e0e0cc;
    --text-dim: #999;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  canvas#stars {
    position: fixed; inset: 0; z-index: 0;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 999;
  }

  body::after {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.88) 100%);
    pointer-events: none; z-index: 998;
  }

  /* MOON */
  .moon {
    position: fixed;
    top: -140px; right: -100px;
    width: 420px; height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #e8e2d4, #b0a898 40%, #6e6860 75%, #3a3530 100%);
    box-shadow:
      inset -35px -25px 70px rgba(0,0,0,0.65),
      inset 12px 12px 35px rgba(255,255,240,0.07),
      0 0 100px rgba(180,170,150,0.07);
    z-index: 1;
    opacity: 0.5;
  }

  .moon::before {
    content: '';
    position: absolute;
    width: 55px; height: 55px;
    border-radius: 50%;
    top: 52%; left: 22%;
    background: radial-gradient(circle at 40% 40%, #9a9288, #6e6860);
    box-shadow:
      inset 4px 4px 10px rgba(0,0,0,0.5),
      85px -45px 0 -18px #8a847a,
      -35px 65px 0 -12px #807870,
      130px 25px 0 -22px #908880;
  }

  /* RADAR */
  .radar-wrap {
    position: fixed;
    bottom: -110px; left: -110px;
    width: 340px; height: 340px;
    z-index: 2; opacity: 0.16;
  }

  .radar-circle {
    position: absolute; border-radius: 50%;
    border: 1px solid var(--green);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .radar-sweep {
    position: absolute;
    width: 50%; height: 50%;
    top: 50%; left: 50%;
    transform-origin: 0% 100%;
    animation: radarSweep 4s linear infinite;
    background: conic-gradient(from 0deg, transparent 75%, rgba(0,255,65,0.55) 100%);
  }

  .radar-ch-h { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--green); transform: translateY(-50%); }
  .radar-ch-v { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--green); transform: translateX(-50%); }

  .radar-blip {
    position: absolute; width: 6px; height: 6px;
    border-radius: 50%; background: var(--green);
    box-shadow: 0 0 8px var(--green);
    opacity: 0; animation: blip 4s 2.1s infinite;
  }

  @keyframes radarSweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes blip { 0%,100%{opacity:0;} 52%,60%{opacity:1;} }

  /* STAMP */
  .stamp {
    position: fixed; top: 30px; left: 36px;
    border: 3px solid var(--red);
    color: var(--red);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 6px;
    padding: 5px 12px;
    transform: rotate(-12deg);
    opacity: 0.22; z-index: 3;
    pointer-events: none;
  }

  /* CROSSHAIR top center */
  .crosshair {
    position: fixed; top: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 3; opacity: 0.28;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }

  .ch-ring {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid var(--green); position: relative;
  }

  .ch-ring::before { content:''; position:absolute; width:1px; height:100%; left:50%; top:0; transform:translateX(-50%); background:var(--green); }
  .ch-ring::after  { content:''; position:absolute; height:1px; width:100%; top:50%; left:0; transform:translateY(-50%); background:var(--green); }

  .ch-label { font-size: 10px; letter-spacing: 3px; color: var(--green); }

  /* DOC info */
  .doc-id {
    position: fixed; bottom: 22px; right: 28px;
    font-size: 11px; letter-spacing: 2px;
    color: var(--text-dim); z-index: 3;
    line-height: 1.9; text-align: right;
  }

  /* BRACKET corners */
  .bracket { position: absolute; width: 20px; height: 20px; }
  .bracket.tl { top:0; left:0; border-top:1px solid var(--red); border-left:1px solid var(--red); }
  .bracket.tr { top:0; right:0; border-top:1px solid var(--red); border-right:1px solid var(--red); }
  .bracket.bl { bottom:0; left:0; border-bottom:1px solid var(--red); border-left:1px solid var(--red); }
  .bracket.br { bottom:0; right:0; border-bottom:1px solid var(--red); border-right:1px solid var(--red); }

  /* MAIN CARD */
  .login-wrap {
    position: relative; z-index: 10;
    width: 90%; max-width: 420px;
    display: flex; flex-direction: column;
    align-items: center;
  }

  .op-label {
    font-size: 11px; letter-spacing: 6px; color: var(--red);
    margin-bottom: 6px;
    opacity: 0; animation: fadeUp 0.5s 0.2s forwards;
  }

  .op-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(34px, 8vw, 54px);
    letter-spacing: 7px; color: #e8e8d4;
    text-align: center; line-height: 1;
    margin-bottom: 4px;
    opacity: 0; animation: fadeUp 0.5s 0.35s forwards;
    text-shadow: 0 0 50px rgba(200,200,180,0.08);
  }

  .op-title span { color: var(--red); }

  .op-sub {
    font-size: 11px; letter-spacing: 4px; color: var(--text-dim);
    margin-bottom: 26px;
    opacity: 0; animation: fadeUp 0.5s 0.5s forwards;
  }

  .login-box {
    width: 100%;
    background: rgba(4,4,6,0.97);
    border: 1px solid #1c1c1c;
    padding: 30px 26px 24px;
    position: relative;
    opacity: 0; animation: fadeUp 0.6s 0.65s forwards;
  }

  .login-box::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--red-dim), transparent);
  }

  /* FINGERPRINT */
  .fp-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    margin-bottom: 22px;
  }

  .fp-icon { width: 48px; height: 48px; opacity: 0.7; }

  .fp-icon svg {
    width: 100%; height: 100%;
    stroke: var(--green); fill: none; stroke-width: 1.3;
    filter: drop-shadow(0 0 5px rgba(0,255,65,0.35));
    animation: fpPulse 2.8s ease-in-out infinite;
  }

  @keyframes fpPulse {
    0%,100% { opacity:0.65; filter: drop-shadow(0 0 4px rgba(0,255,65,0.3)); }
    50%      { opacity:1;    filter: drop-shadow(0 0 12px rgba(0,255,65,0.65)); }
  }

  .fp-label {
    font-size: 11px; letter-spacing: 4px; color: var(--text-dim);
    text-transform: uppercase;
  }

  .divider {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:#151515; }
  .divider span { font-size: 10px; letter-spacing: 3px; color: var(--text-dim); }

  input {
    width: 100%;
    background: #000;
    border: 1px solid #222;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px; padding: 13px;
    text-align: center; letter-spacing: 7px;
    text-transform: uppercase; outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--green);
  }

  input:focus {
    border-color: #2a4a2a;
    box-shadow: 0 0 16px rgba(0,255,65,0.1);
  }

  button {
    width: 100%;
    background: transparent;
    border: 1px solid #2a3a2a;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px; font-weight: bold;
    padding: 13px; letter-spacing: 4px;
    cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; position: relative; overflow: hidden;
  }

  button::before {
    content: ''; position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,65,0.07), transparent);
    transition: left 0.4s;
  }

  button:hover { border-color: var(--green-dim); background: rgba(0,255,65,0.04); box-shadow: 0 0 20px rgba(0,255,65,0.08); }
  button:hover::before { left: 100%; }

  #error-msg {
    color: var(--red); margin-top: 12px;
    font-size: 12px; letter-spacing: 3px;
    text-align: center; height: 16px; opacity: 0;
  }

  .flash { animation: flashRed 0.45s 3 forwards; }

  @keyframes flashRed { 0%,100%{opacity:1;} 50%{opacity:0;} }

  .status-row {
    display: flex; justify-content: space-between;
    font-size: 10px; letter-spacing: 2px; color: var(--text-dim);
    margin-top: 18px; padding-top: 12px; border-top: 1px solid #0e0e0e;
  }

  .dot {
    display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; background: var(--green);
    margin-right: 4px; box-shadow: 0 0 5px var(--green);
    animation: blink 1.4s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.1;} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="moon"></div>

<!-- Radar -->
<div class="radar-wrap">
  <div class="radar-circle" style="width:320px;height:320px;"></div>
  <div class="radar-circle" style="width:210px;height:210px;"></div>
  <div class="radar-circle" style="width:105px;height:105px;"></div>
  <div class="radar-ch-h"></div>
  <div class="radar-ch-v"></div>
  <div class="radar-sweep"></div>
  <div class="radar-blip" style="top:37%;left:61%;"></div>
</div>

<div class="stamp">CLASSIFIED</div>

<div class="crosshair">
  <div class="ch-ring"></div>
  <div class="ch-label">TARGET LOCKED</div>
</div>

<div class="doc-id">
  OP-MOON-LANDING<br>
  CLEARANCE LVL 5<br>
  AES-256 // ACTIVE
</div>

<div class="login-wrap">
  <div class="op-label">⬛ STRENGT HEMMELIG ⬛</div>
  <div class="op-title">OPERATION <span>MOON</span> LANDING</div>
  <div class="op-sub">AMAZING RACE: BUCUREȘTI // MISSION CONTROL</div>

  <div class="login-box">
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>

    <div class="fp-wrap">
      <div class="fp-icon">
        <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <path d="M26 4C14 4 4 14 4 26"/>
          <path d="M26 4C38 4 48 14 48 26"/>
          <path d="M10 36C8 33 7 29.6 7 26"/>
          <path d="M45 26c0 3.6-1 7-2.8 9.8"/>
          <path d="M26 12c7.7 0 14 6.3 14 14 0 5-2.6 9.4-6.5 12"/>
          <path d="M18.5 38c-3.9-2.6-6.5-7-6.5-12 0-7.7 6.3-14 14-14"/>
          <path d="M26 20c3.3 0 6 2.7 6 6 0 3-1.7 5.6-4.3 6.9"/>
          <path d="M20 32.9C18.3 31.6 17 29.4 17 26c0-3.3 2.7-6 6-6"/>
          <path d="M26 28c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
          <path d="M26 28v16"/>
          <path d="M22 34h4"/>
          <path d="M20 40h6"/>
          <path d="M22 46h4"/>
        </svg>
      </div>
      <div class="fp-label">Biometrisk verifisering</div>
    </div>

    <div class="divider"><span>AGENT-KODE PÅKREVD</span></div>

    <input type="text" id="accessCode" placeholder="· · · · · · · ·" autocomplete="off" spellcheck="false">
    <button onclick="verifyCode()">▶ &nbsp; VERIFISER IDENTITET</button>

    <div id="error-msg">⬛ TILGANG NEKTET — UGYLDIG KODE ⬛</div>

    <div class="status-row">
      <span><span class="dot"></span>ONLINE</span>
      <span>2 AGENTER VENTER</span>
      <span>01.05 // 12:00</span>
    </div>
  </div>
</div>

<script>
  // STARFIELD
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const stars = Array.from({length: 200}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.3 + 0.2,
    o: Math.random() * 0.5 + 0.1,
  }));

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(210,205,190,${s.o})`;
      ctx.fill();
      s.o += (Math.random() - 0.5) * 0.012;
      s.o = Math.max(0.05, Math.min(0.75, s.o));
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  // LOGIN
  function verifyCode() {
    const input = document.getElementById('accessCode').value.toUpperCase().trim();
    const errorMsg = document.getElementById('error-msg');

    if (input === 'ALPHA-77') {
      window.location.href = 'alpha_brief.html';
    } else if (input === 'BRAVO-99') {
      window.location.href = 'bravo_brief.html';
    } else {
      errorMsg.classList.remove('flash');
      void errorMsg.offsetWidth;
      errorMsg.classList.add('flash');
      errorMsg.style.opacity = '1';
      document.getElementById('accessCode').value = '';
    }
  }

  document.getElementById('accessCode').addEventListener('keypress', e => {
    if (e.key === 'Enter') verifyCode();
  });
</script>
</body>
</html>
